<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Princess+Sofia&family=Cormorant+Garamond:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background -->
    <div id="stars"></div>
    <div id="fireflies"></div>

    <!-- Floating Music Player -->

    <div class="music-box">

        <h3>♪ Music</h3>

        <iframe
        src="https://youtu.be/ckwRhLE9_LY?si=1fNODrRyADwsFCJh"
        title="Birthday Music"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
        </iframe>

    </div>


    <!-- Hero -->

    <section class="hero">

        <h1 class="title">
            Happy Birthday
        </h1>

        <p class="subtitle">
            HaPpY 15th YeAr DeAr Vin
        </p>

    </section>



    <!-- Envelope -->

    <section class="letter-section">

        <div class="envelope" id="envelope">

            <div class="flap"></div>

            <div class="letter" id="letter">

                <h2>Dear You,</h2>

                <p>

                   

                </p>

                <p>

                   

                    ❤️

                </p>

            </div>

        </div>

        <p class="click-text">
            Click the envelope
        </p>

    </section>



    <!-- Divider -->

    <section class="divider">

        ✨ ✨ ✨

    </section>



    <!-- Memories -->

    <section class="memories">

        <h2>

            Beautiful Memories

        </h2>

        <div class="cards">

            <div class="card">

                <h3>Memory One</h3>

                <p>

                    Write anything here.

                </p>

            </div>

            <div class="card">

                <h3>Memory Two</h3>

                <p>

                    Write anything here.

                </p>

            </div>

            <div class="card">

                <h3>Memory Three</h3>

                <p>

                    Write anything here.

                </p>

            </div>

        </div>

    </section>



    <!-- Ending -->

    <section class="ending">

        <h2>

            May every dream find its way to you.

        </h2>

        <p>

            Happy Birthday ✨

        </p>

    </section>



<script src="script.js"></script>

</body>
</html>
